name: build-macOS

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      run_gui_smoke:
        description: 'Try launching the GLFW app for 10 seconds on the macOS runner. Usually leave this off; CI mainly validates build/linking.'
        required: false
        default: false
        type: boolean

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    env:
      CGO_ENABLED: '1'
      MACOSX_DEPLOYMENT_TARGET: '13.4'
      CGO_CFLAGS: '-mmacosx-version-min=13.4'
      CGO_LDFLAGS: '-mmacosx-version-min=13.4'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install macOS native dependencies
        run: |
          brew update
          brew install pkg-config glfw maven

      - name: Show tool versions
        run: |
          go version
          java -version
          mvn -version
          clang --version
          pkg-config --modversion glfw3 || true

      - name: Download Go modules
        run: go mod download

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -l . | wc -l | tr -d ' ')" -gt 0 ]; then
            echo "The following Go files need gofmt:" >&2
            gofmt -l . >&2
            exit 1
          fi

      - name: Build SMES reader jar
        run: mvn -B -f swim/smes/pom.xml -DskipTests package

      - name: Build REDS frontend
        run: |
          mkdir -p build
          go build -v -o build/reds ./cmd/reds

      - name: Run Go tests
        run: go test -v ./...

      - name: Verify build outputs
        run: |
          test -x build/reds
          test -f swim/smes/target/faascope-stdds-1.0-SNAPSHOT.jar
          file build/reds
          ls -lh build/reds swim/smes/target/faascope-stdds-1.0-SNAPSHOT.jar

      - name: Optional GUI smoke launch
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gui_smoke }}
        run: |
          set -euo pipefail
          ./build/reds &
          pid=$!
          sleep 10
          if kill -0 "$pid" 2>/dev/null; then
            echo "REDS stayed alive for 10 seconds; stopping smoke process."
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          else
            echo "REDS exited during GUI smoke launch; checking exit status."
            wait "$pid"
          fi

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reds-macos-build
          path: |
            build/reds
            swim/smes/target/faascope-stdds-1.0-SNAPSHOT.jar
          if-no-files-found: error
